<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/chessground.base.css" />
  <link rel="stylesheet" href="css/chessground.brown.css" />
  <link rel="stylesheet" href="css/chessground.cburnett.css" />
</head>
<body>
  <header class="page-header">
    <h1 class="page-header__title">Historical Chess</h1>
  </header>

  <main class="page-layout">
    <section class="board-stage">
      <div class="board-container">
        <div class="board"></div>
      </div>
    </section>

    <aside class="capture-panel" aria-live="polite">
      <p class="capture-panel__eyebrow">Defeated Rulers</p>
      <h1 class="capture-panel__title">Your collection starts empty</h1>
      <p class="capture-panel__subtitle">Defeat enemy pieces to collect their ruler cards.</p>
      <div class="capture-panel__collection" aria-label="Collected ruler cards"></div>
      <img class="capture-panel__image" alt="" hidden />
      <p class="capture-panel__status">Defeat a black piece to claim its ruler card.</p>
      <p class="capture-panel__summary" hidden></p>
      <a class="capture-panel__link" href="" target="_blank" rel="noreferrer" hidden>Open Wikipedia</a>
    </aside>
  </main>

  <script src="js/chessground.min.js"></script>
  <script src="js/chess.min.js"></script>
  <script type="module" src="js/script.js"></script></body>
</html>
